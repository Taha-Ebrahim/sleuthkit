name: Code Coverage

on:
  push:
    branches:
      - main
      - develop
      - develop-4.14
  pull_request:
    branches:
      - main
      - develop
      - develop-4.14

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine number of cores
      run: |
        CORES=$(nproc)
        echo "cores=$CORES" >>$GITHUB_OUTPUT
        echo "Using $CORES cores"

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y lcov build-essential autoconf automake libtool

    - name: Unpack and List the test data
      run: |
        cd ..
        pwd
        wget  -q https://digitalcorpora.s3.amazonaws.com/corpora/drives/tsk-2024/sleuthkit_test_data.zip
        unzip sleuthkit_test_data.zip
        cd sleuthkit_test_data
        make unpack
        find . -ls | grep -v '[.]git'
        echo "SLEUTHKIT_TEST_DATA_DIR=$(pwd)" >> $GITHUB_ENV

    - name: Run bootstrap
      run: |
        ./bootstrap

    - name: Configure with coverage flags
      run: |
        ./configure CFLAGS="--coverage -fprofile-update=atomic" CXXFLAGS="--coverage -fprofile-update=atomic" LDFLAGS="--coverage"

    - name: Show config file
      run: cat tsk/tsk_config.h

    - name: Build project
      run: make -j$(nproc)

    - name: Run tests
      run: make check V=0

    - name: Generate coverage report
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        files: coverage.info
        flags: unittests
        name: sleuthkit-codecov

    - uses: ammaraskar/gcc-problem-matcher@0.2.0
      name: GCC Problem Matcher
    
  mingw-wine-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW, Wine, and build tools
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install -y mingw-w64 wine lcov build-essential autoconf automake libtool gcovr unzip

    - name: Download and unpack test data
      run: |
        cd ..
        wget -q https://digitalcorpora.s3.amazonaws.com/corpora/drives/tsk-2024/sleuthkit_test_data.zip
        unzip -q sleuthkit_test_data.zip
        cd sleuthkit_test_data
        make unpack
        echo "SLEUTHKIT_TEST_DATA_DIR=$(pwd)" >> $GITHUB_ENV

    - name: Run bootstrap
      run: ./bootstrap

    - name: Cross-compile with MinGW + coverage flags
      run: |
        ./configure --host=x86_64-w64-mingw32 CC=x86_64-w64-mingw32-gcc CFLAGS="--coverage" LDFLAGS="--coverage"
        make -j$(nproc)

    - name: Run tests under Wine
      run: |
        wine ./tests/some_test.exe || true
        # Replace with actual Windows binaries produced by MinGW

    - name: Generate coverage report (MinGW)
      run: |
        gcovr -r . --xml-pretty --gcov-executable x86_64-w64-mingw32-gcov > coverage-windows.xml
        find . -ls | grep gcda || true

    - name: Upload MinGW + Wine coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        files: coverage-windows.xml
        flags: windows-mingw
        name: sleuthkit-codecov-wine
        
    - uses: ammaraskar/gcc-problem-matcher@0.2.0
      name: GCC Problem Matcher

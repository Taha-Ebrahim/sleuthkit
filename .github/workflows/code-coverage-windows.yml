name: Code Coverage (Windows)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
      - develop-4.14

jobs:
  windows-coverage:
    runs-on: windows-latest
    timeout-minutes: 50

    env:
      TSK_HOME: "${{ github.workspace }}"

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v1
      - uses: microsoft/setup-msbuild@v1.1

      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install Chocolatey and MinGW
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force;
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install mingw nuget.commandline ant --ignore-dependencies
          python -m pip install gcovr

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Print the Java release from JAVA_HOME
        shell: bash
        run: |
          find $JAVA_HOME -print
      
      - name: Set JDK_HOME and INCLUDE
        shell: bash
        run: |
          echo "JDK_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "INCLUDE=$INCLUDE;$JAVA_HOME/include;$JAVA_HOME/include/win32" >> $GITHUB_ENV

      - name: Demo JAVA_HOME/include/jni.h
        shell: bash
        run: |
          ls -l $JAVA_HOME/include/jni.h
          echo INCLUDE=$INCLUDE
          ls -l $GITHUB_ENV

      - name: bash printenv
        shell: bash
        run: |
          printenv | sort

      - name: Add MinGW to PATH
        run: echo "C:\ProgramData\chocolatey\bin" >> $GITHUB_PATH

      - name: Download and unpack test data
        shell: bash
        run: |
          cd ..
          curl -s -O https://digitalcorpora.s3.amazonaws.com/corpora/drives/tsk-2024/sleuthkit_test_data.zip
          unzip -q sleuthkit_test_data.zip
          cd sleuthkit_test_data
          make unpack
          echo "SLEUTHKIT_TEST_DATA_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Build TSK
        run: |
          python win32\updateAndBuildAll.py -m

      # ✅ Build Java bindings (from your original workflow)
      - name: Build Java Bindings
        shell: bash
        run: |
          ant -version
          cd bindings/java
          ant -q dist
          cd ../..
          cd case-uco/java
          ant -q
          cd ../..

      # Run tests
      - name: Run tests
        shell: bash
        run: make check V=0

      # Generate coverage report using gcovr
      - name: Generate coverage report
        shell: bash
        run: gcovr -r . --xml-pretty > coverage-windows.xml

      # Upload to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-windows.xml
          flags: windows
          name: sleuthkit-codecov-windows
